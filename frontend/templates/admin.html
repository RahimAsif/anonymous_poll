<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin – Polls</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body class="page">
    <header class="top-bar">
      <div class="top-bar-left">
        <div class="brand">Pacific Sharks Poll Admin</div>
      </div>
      <div class="top-bar-right">
        <a href="{{ url_for('home') }}" class="top-link">Home</a>
      </div>
    </header>

    <main class="content">
      <section class="card">
        <h1 class="card-title">Create a new poll</h1>

        <label class="field-label" for="question">Question</label>
        <textarea
          id="question"
          rows="2"
          class="field-input"
          placeholder="Enter your poll question"
        ></textarea>

        <label class="field-label">Options</label>
        <div id="options-container"></div>
        <button id="add-option" class="btn btn-secondary" type="button">
          + Add option
        </button>

        <div class="field-row">
          <label class="checkbox-label">
            <input type="checkbox" id="multiple_allowed" />
            Allow multiple selections
          </label>
        </div>

        <label class="field-label" for="max_choices">
          Max choices (used only if multiple selections allowed)
        </label>
        <input
          type="number"
          id="max_choices"
          min="1"
          value="1"
          class="field-input"
        />

        <div class="field-row">
          <label class="checkbox-label">
            <input type="checkbox" id="hide_results" />
            Hide live results (show only total votes)
          </label>
        </div>

        <button id="create-poll" class="btn btn-primary" type="button">
          Create poll
        </button>

        <div class="status" id="status"></div>
      </section>

      <section class="card">
        <h2 class="card-title">Existing polls</h2>
        {% if polls %}
        <ul class="poll-list">
          {% for p in polls %}
          <li class="poll-list-item">
            <div class="poll-list-main">
              <span class="poll-question">{{ p.question }}</span>
              <span class="poll-id">#{{ p.id }}</span>
            </div>
            <div class="poll-list-actions">
              <a
                href="{{ url_for('poll_view', poll_id=p.id) }}"
                class="btn btn-link"
                target="_blank"
              >
                Open poll
              </a>
              <button
                class="btn btn-secondary btn-generate-codes"
                data-poll-id="{{ p.id }}"
                data-poll-question="{{ p.question }}"
              >
                Generate codes
              </button>
            </div>
          </li>
          {% endfor %}
        </ul>
        {% else %}
        <p class="muted">No polls yet. Create one above.</p>
        {% endif %}
      </section>

      <section class="card" id="codes-card" style="display: none">
        <h2 class="card-title" id="codes-title">Codes</h2>
        <div class="field-row">
          <label class="field-label-inline" for="codes-count"
            >Number of codes to generate</label
          >
          <input
            type="number"
            id="codes-count"
            min="1"
            value="50"
            class="field-input-inline"
          />
          <button
            id="generate-codes-confirm"
            class="btn btn-primary"
            type="button"
          >
            Generate
          </button>
        </div>
        <div class="status" id="codes-status"></div>
        <textarea
          id="codes-output"
          class="field-input codes-output"
          rows="8"
          readonly
          placeholder="Generated codes will appear here"
        ></textarea>
      </section>
    </main>

    <script src="{{ url_for('static', filename='admin.js') }}"></script>
  </body>
</html>
