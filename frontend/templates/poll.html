<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Poll</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="title">Pacific Sharks Anonymous Poll</h1>

      <div class="card">
        <label class="label">Enter your voting code</label>
        <input id="code" class="input" placeholder="Enter your code" />
      </div>

      <div class="card" id="actual_poll">
        <h2 id="question" class="question"></h2>
        <div id="options" class="options"></div>
      </div>

      <div class="card">
        <h3 class="subtitle">Live Results</h3>
        <div id="results"></div>
      </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
      const POLL_ID = {{ poll_id }};
      initPoll(POLL_ID);
    </script>
  </body>
</html>
